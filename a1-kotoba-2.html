<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Kosakata — 第２課</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Kaisei+Decol:wght@400;700&display=swap');

  :root {
    --red: #8B1A1A;
    --red-light: #c0392b;
    --cream: #fdf6ec;
    --gold: #c9933a;
    --dark: #1a1a1a;
    --correct: #2e7d32;
    --wrong: #b71c1c;
    --card-bg: #fff8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    padding: 16px;
    color: var(--dark);
  }

  header {
    background: var(--red);
    color: white;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 20px;
    text-align: center;
    box-shadow: 0 4px 12px rgba(139,26,26,0.3);
  }
  header .lesson-tag { font-size: 11px; letter-spacing: 2px; color: #f4c97a; margin-bottom: 4px; }
  header h1 { font-family: 'Kaisei Decol', serif; font-size: 20px; line-height: 1.3; }
  header .subtitle { font-size: 12px; color: #f4c97a; margin-top: 4px; }

  .session-grid { display: flex; flex-direction: column; gap: 10px; }

  .sess-btn {
    background: white;
    border: 2px solid #e0cfc0;
    border-radius: 14px;
    padding: 14px 16px 14px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .sess-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--red);
  }
  .sess-btn.all::before { background: var(--gold); }
  .sess-btn:hover { border-color: var(--red); background: #fff3e0; }
  .sess-btn .sess-title { font-size: 14px; font-weight: 700; color: var(--red); display: block; margin-bottom: 2px; }
  .sess-btn.all .sess-title { color: var(--gold); }
  .sess-btn .sess-jp { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
  .sess-btn .sess-count {
    font-size: 11px; background: #f4e8d8; color: var(--red);
    border-radius: 20px; padding: 2px 8px; display: inline-block;
  }
  .sess-btn.all .sess-count { background: #fef3dc; color: var(--gold); }

  .mode-wrap { display: flex; gap: 8px; margin-bottom: 14px; }
  .mode-btn {
    flex: 1; padding: 8px 4px;
    border: 2px solid var(--red); background: white; color: var(--red);
    border-radius: 8px; font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-btn.active { background: var(--red); color: white; }

  .progress-label { text-align: right; font-size: 11px; color: #888; margin-bottom: 6px; }
  .progress-wrap { background: #e0d0c0; border-radius: 8px; height: 8px; margin-bottom: 14px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--gold); border-radius: 8px; transition: width 0.4s ease; }

  .card {
    background: var(--card-bg); border-radius: 16px; padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 14px;
    border: 1px solid #ead9c8;
  }

  .section-badge {
    display: inline-block; font-size: 10px; background: var(--red);
    color: white; border-radius: 20px; padding: 2px 10px; margin-bottom: 10px;
  }

  .question { font-size: 28px; text-align: center; margin: 12px 0 20px; line-height: 1.8; }
  .question ruby rt { font-size: 11px; color: var(--red); }
  .question-label { text-align: center; font-size: 11px; color: #999; margin-bottom: 8px; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: white; border: 2px solid #e0cfc0; border-radius: 12px;
    padding: 12px 16px; font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
    text-align: left; cursor: pointer; transition: all 0.2s; line-height: 1.8;
  }
  .opt-btn ruby rt { font-size: 10px; color: var(--red); }
  .opt-btn:hover:not(:disabled) { border-color: var(--gold); background: #fff3e0; }
  .opt-btn.correct { background: #e8f5e9; border-color: var(--correct); color: var(--correct); }
  .opt-btn.wrong { background: #ffebee; border-color: var(--wrong); color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .feedback { margin-top: 14px; font-size: 13px; text-align: center; font-weight: bold; min-height: 20px; }
  .feedback.ok { color: var(--correct); }
  .feedback.ng { color: var(--wrong); }

  .nav { display: flex; justify-content: center; margin-top: 4px; }
  .nav-btn {
    background: var(--red); color: white; border: none; border-radius: 10px;
    padding: 10px 28px; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  }
  .nav-btn:disabled { background: #ccc; cursor: default; }

  .back-btn {
    background: none; border: none; color: var(--red); font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
    margin-bottom: 12px; padding: 0;
  }

  .result-box {
    background: var(--card-bg); border-radius: 16px; padding: 24px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08); border: 1px solid #ead9c8; text-align: center;
  }
  .result-box h2 { font-family: 'Kaisei Decol', serif; font-size: 22px; color: var(--red); margin-bottom: 8px; }
  .score-big { font-size: 52px; font-weight: 700; color: var(--gold); line-height: 1; margin: 10px 0; }
  .stars { font-size: 28px; margin: 8px 0; }

  .wrong-review { margin-top: 16px; text-align: left; }
  .wrong-review h3 { font-size: 13px; color: var(--red); border-bottom: 1px solid #e0cfc0; padding-bottom: 6px; margin-bottom: 8px; }
  .wrong-item {
    background: white; border: 1px solid #ead9c8; border-radius: 8px;
    padding: 10px 12px; margin-bottom: 6px; font-size: 13px; line-height: 1.7;
  }
  .wrong-item ruby rt { font-size: 10px; color: var(--red); }

  .result-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
  .restart-btn {
    background: var(--red); color: white; border: none; border-radius: 10px;
    padding: 11px 22px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  }
  .home-btn {
    background: white; color: var(--red); border: 2px solid var(--red); border-radius: 10px;
    padding: 11px 22px; font-size: 13px; font-family: 'Noto Sans JP', sans-serif; cursor: pointer;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="lesson-tag">Irodori 入門 — 第２課</div>
  <h1>すみません、よくわかりません</h1>
  <div class="subtitle">Pilih sesi lalu mulai kuis!</div>
</header>

<!-- SESSION PICKER -->
<div id="session-screen">
  <div class="card" style="padding:18px 16px;">
    <p style="font-size:13px;color:#888;text-align:center;margin-bottom:14px;">Pilih bagian yang ingin dilatih:</p>
    <div class="session-grid">
      <button class="sess-btn" onclick="startSession(1)">
        <span class="sess-title">Bagian 1</span>
        <span class="sess-jp">もういちど、お願いします</span>
        <span class="sess-count">25 kata (termasuk angka 0–10)</span>
      </button>
      <button class="sess-btn" onclick="startSession(2)">
        <span class="sess-title">Bagian 2</span>
        <span class="sess-jp">日本語、できますか？</span>
        <span class="sess-count">14 kata</span>
      </button>
      <button class="sess-btn" onclick="startSession(3)">
        <span class="sess-title">Bagian 3</span>
        <span class="sess-jp">これは日本語で何と言いますか？</span>
        <span class="sess-count">11 kata</span>
      </button>
      <button class="sess-btn all" onclick="startSession(0)">
        <span class="sess-title">🌟 Semua Bagian</span>
        <span class="sess-jp">Gabungan Bagian 1 + 2 + 3</span>
        <span class="sess-count">50 kata</span>
      </button>
    </div>
  </div>
</div>

<!-- QUIZ SCREEN -->
<div id="quiz-screen" class="hidden">
  <button class="back-btn" onclick="goHome()">← Pilih sesi lain</button>

  <div class="mode-wrap">
    <button class="mode-btn active" id="btn-jp-id" onclick="setMode('jp-id')">🇯🇵 → 🇮🇩</button>
    <button class="mode-btn" id="btn-id-jp" onclick="setMode('id-jp')">🇮🇩 → 🇯🇵</button>
  </div>

  <div class="progress-label" id="prog-label">1 / 25</div>
  <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:4%"></div></div>

  <div class="card">
    <div class="section-badge" id="section-badge"></div>
    <div class="question-label" id="q-label"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="next-btn" onclick="nextQuestion()" disabled>Berikutnya →</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="hidden">
  <div class="result-box">
    <h2>結果 — Hasil Quiz</h2>
    <div class="score-big" id="score-display"></div>
    <div style="font-size:12px;color:#888;">soal benar</div>
    <div class="stars" id="stars-display"></div>
    <div class="wrong-review" id="wrong-review"></div>
    <div class="result-btns">
      <button class="home-btn" onclick="goHome()">🏠 Sesi Lain</button>
      <button class="restart-btn" onclick="restartSession()">🔄 Ulangi Sesi Ini</button>
    </div>
  </div>
</div>

<script>
const secLabel = {
  1: "Bagian 1",
  2: "Bagian 2",
  3: "Bagian 3",
};

const vocab = [
  // ── Bagian 1 (25) ──
  { jp:"よく",           rd:null,               id:"dengan baik",                 sec:1 },
  { jp:"もういちど",      rd:null,               id:"sekali lagi",                 sec:1 },
  { jp:"もう少し",        rd:"もうすこし",        id:"sedikit lagi",                sec:1 },
  { jp:"ゆっくり",        rd:null,               id:"perlahan; pelan",             sec:1 },
  { jp:"在留カード",      rd:"ざいりゅうカード",   id:"kartu izin tinggal",          sec:1 },
  { jp:"ここ",           rd:null,               id:"(di) sini",                   sec:1 },
  { jp:"名前",           rd:"なまえ",            id:"nama",                        sec:1 },
  { jp:"部屋",           rd:"へや",              id:"kamar; ruangan",              sec:1 },
  { jp:"わかりません",    rd:null,               id:"Saya tidak mengerti/paham.",  sec:1 },
  { jp:"お願いします",    rd:"おねがいします",     id:"Tolong.",                     sec:1 },
  { jp:"言ってください",  rd:"いってください",     id:"Tolong katakan/ucapkan.",     sec:1 },
  { jp:"見せてください",  rd:"みせてください",     id:"Tolong tunjukkan.",           sec:1 },
  { jp:"書いてください",  rd:"かいてください",     id:"Tolong tulis.",               sec:1 },
  { jp:"わかりました",    rd:null,               id:"Saya mengerti/paham.",        sec:1 },
  { jp:"０",             rd:"ぜろ",              id:"nol",                         sec:1 },
  { jp:"１",             rd:"いち",              id:"satu",                        sec:1 },
  { jp:"２",             rd:"に",                id:"dua",                         sec:1 },
  { jp:"３",             rd:"さん",              id:"tiga",                        sec:1 },
  { jp:"４",             rd:"よん",              id:"empat",                       sec:1 },
  { jp:"５",             rd:"ご",                id:"lima",                        sec:1 },
  { jp:"６",             rd:"ろく",              id:"enam",                        sec:1 },
  { jp:"７",             rd:"なな",              id:"tujuh",                       sec:1 },
  { jp:"８",             rd:"はち",              id:"delapan",                     sec:1 },
  { jp:"９",             rd:"きゅう",             id:"sembilan",                    sec:1 },
  { jp:"１０",            rd:"じゅう",             id:"sepuluh",                     sec:1 },
  // ── Bagian 2 (14) ──
  { jp:"日本語",          rd:"にほんご",           id:"bahasa Jepang",               sec:2 },
  { jp:"英語",           rd:"えいご",             id:"bahasa Inggris",              sec:2 },
  { jp:"中国語",          rd:"ちゅうごくご",        id:"bahasa Mandarin",             sec:2 },
  { jp:"インドネシア語",   rd:"インドネシアご",      id:"bahasa Indonesia",            sec:2 },
  { jp:"はい",           rd:null,               id:"ya",                           sec:2 },
  { jp:"少し",           rd:"すこし",             id:"sedikit",                     sec:2 },
  { jp:"お客さん",        rd:"おきゃくさん",        id:"pelanggan; pembeli",          sec:2 },
  { jp:"わかりますか？",   rd:null,               id:"Apakah Anda paham/mengerti?", sec:2 },
  { jp:"できますか？",     rd:null,               id:"Apakah Anda bisa?",           sec:2 },
  { jp:"できます",        rd:null,               id:"Saya bisa.",                  sec:2 },
  { jp:"わかります",      rd:null,               id:"Saya paham/mengerti.",        sec:2 },
  { jp:"はい、どうぞ",     rd:null,               id:"Silakan.",                    sec:2 },
  { jp:"じゃあ",          rd:null,               id:"Kalau begitu...",             sec:2 },
  { jp:"あのう",          rd:null,               id:"Emm... (ungkapan pembuka)",   sec:2 },
  // ── Bagian 3 (11) ──
  { jp:"日本語で",        rd:"にほんごで",          id:"dalam bahasa Jepang",         sec:3 },
  { jp:"何",             rd:"なん",               id:"apa",                         sec:3 },
  { jp:"消しゴム",        rd:"けしゴム",            id:"penghapus karet",             sec:3 },
  { jp:"傘",             rd:"かさ",               id:"payung",                      sec:3 },
  { jp:"スマホ",          rd:null,               id:"ponsel pintar",                sec:3 },
  { jp:"免許証",          rd:"めんきょしょう",       id:"surat izin; lisensi",         sec:3 },
  { jp:"蚊",             rd:"か",                id:"nyamuk",                       sec:3 },
  { jp:"何ですか？",      rd:"なんですか？",         id:"Apa?",                        sec:3 },
  { jp:"何と言いますか？", rd:"なんといいますか？",    id:"Apakah penyebutannya?",      sec:3 },
  { jp:"え？",           rd:null,               id:"Hah?",                         sec:3 },
  { jp:"そうそう",        rd:null,               id:"Ya, ya... Benar.",            sec:3 },
];

let mode = 'jp-id';
let pool = [];
let shuffled = [];
let current = 0;
let score = 0;
let answered = false;
let wrongList = [];
let activeSec = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) {
  ['session-screen','quiz-screen','result-screen'].forEach(s =>
    document.getElementById(s).classList.toggle('hidden', s !== id));
}

function goHome() { show('session-screen'); }

function startSession(sec) {
  activeSec = sec;
  pool = sec === 0 ? vocab : vocab.filter(v => v.sec === sec);
  mode = 'jp-id';
  document.getElementById('btn-jp-id').classList.add('active');
  document.getElementById('btn-id-jp').classList.remove('active');
  show('quiz-screen');
  runQuiz();
}

function restartSession() {
  show('quiz-screen');
  runQuiz();
}

function runQuiz() {
  shuffled = shuffle(pool);
  current = 0; score = 0; answered = false; wrongList = [];
  renderQuestion();
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-jp-id').classList.toggle('active', m === 'jp-id');
  document.getElementById('btn-id-jp').classList.toggle('active', m === 'id-jp');
  runQuiz();
}

function makeRuby(v) {
  return v.rd
    ? `<ruby>${v.jp}<rt>${v.rd}</rt></ruby>`
    : `<span>${v.jp}</span>`;
}

function renderQuestion() {
  const v = shuffled[current];
  const total = shuffled.length;

  document.getElementById('prog-label').textContent = `${current + 1} / ${total}`;
  document.getElementById('prog-bar').style.width = `${((current + 1) / total) * 100}%`;

  const badge = activeSec === 0
    ? `${secLabel[v.sec]} (Semua)`
    : secLabel[v.sec];
  document.getElementById('section-badge').textContent = badge;

  if (mode === 'jp-id') {
    document.getElementById('question-text').innerHTML = makeRuby(v);
    document.getElementById('q-label').textContent = 'Apa artinya dalam bahasa Indonesia?';
  } else {
    document.getElementById('question-text').textContent = v.id;
    document.getElementById('q-label').textContent = 'Mana ungkapan Jepang yang benar?';
  }

  // distractor dari semua vocab (biar lebih menantang)
  const distractors = shuffle(vocab.filter(x => x !== v)).slice(0, 3);
  const choices = shuffle([v, ...distractors]);

  const optEl = document.getElementById('options');
  optEl.innerHTML = '';
  choices.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = mode === 'jp-id' ? ch.id : makeRuby(ch);
    btn.onclick = () => handleAnswer(btn, ch === v, v);
    optEl.appendChild(btn);
  });

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').disabled = true;
  answered = false;
}

function handleAnswer(btn, correct, v) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt-btn');

  if (correct) {
    btn.classList.add('correct');
    score++;
    document.getElementById('feedback').textContent = '✅ Benar!';
    document.getElementById('feedback').className = 'feedback ok';
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b => {
      const match = mode === 'jp-id'
        ? b.textContent.trim() === v.id
        : b.innerText.replace(/\s/g,'').includes(v.jp.replace(/\s/g,''));
      if (match) b.classList.add('correct');
    });
    wrongList.push(v);
    document.getElementById('feedback').innerHTML =
      `❌ Salah! Jawaban: <b>${mode === 'jp-id' ? v.id : v.jp}</b>`;
    document.getElementById('feedback').className = 'feedback ng';
  }

  allBtns.forEach(b => b.disabled = true);
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) showResult();
  else renderQuestion();
}

function showResult() {
  show('result-screen');
  const total = shuffled.length;
  const pct = score / total;
  document.getElementById('score-display').textContent = `${score} / ${total}`;
  document.getElementById('stars-display').textContent =
    pct >= 0.9 ? '⭐⭐⭐' : pct >= 0.7 ? '⭐⭐' : '⭐';

  const wr = document.getElementById('wrong-review');
  if (wrongList.length === 0) {
    wr.innerHTML = '<p style="text-align:center;color:green;font-size:14px;margin-top:10px;">🎉 Sempurna! Tidak ada yang salah!</p>';
  } else {
    wr.innerHTML = `<h3>📝 Perlu dipelajari lagi (${wrongList.length} kata)</h3>` +
      wrongList.map(v => `<div class="wrong-item">${makeRuby(v)} → <b>${v.id}</b></div>`).join('');
  }
}
</script>
</body>
</html>
